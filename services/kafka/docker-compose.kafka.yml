# docker-compose.kafka.yml — Standalone Kafka + Zookeeper for local development.
#
# Usage:
#   docker compose -f services/kafka/docker-compose.kafka.yml up -d
#
# Topics created on startup:
#   • transaction-ingestion  (Go gateway → Python consumer)
#   • analysis-complete      (Python consumer → downstream)
#
# Internal access (other containers): kafka:9092
# Host access:                        localhost:9092

version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    container_name: cpg-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    container_name: cpg-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # One-shot init container that creates both topics then exits.
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cpg-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092
        --create --if-not-exists
        --topic transaction-ingestion
        --replication-factor 1 --partitions 1 &&
       kafka-topics --bootstrap-server kafka:9092
        --create --if-not-exists
        --topic analysis-complete
        --replication-factor 1 --partitions 1 &&
       echo 'Topics ready:' &&
       kafka-topics --bootstrap-server kafka:9092 --list"
    restart: "no"
