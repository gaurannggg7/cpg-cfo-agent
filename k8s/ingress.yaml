# ingress.yaml — nginx Ingress Controller with path-based routing.
#
# Install nginx ingress controller first:
#   kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.10.0/deploy/static/provider/cloud/deploy.yaml
#
# Path routing:
#   /api/*   → backend-service:8000  (strips /api prefix via rewrite)
#   /*       → frontend-service:80
#
# NOTE: With this ingress the frontend must call /api/analyze (not /analyze).
# Update NEXT_PUBLIC_API_URL in app-config.yaml to point to the ingress host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cpg-cfo-agent-ingress
  namespace: cpg-cfo-agent
  labels:
    app.kubernetes.io/part-of: cpg-cfo-agent
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: cpg-cfo-agent.example.com  # Replace with your domain
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
