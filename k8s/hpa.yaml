# hpa.yaml — HorizontalPodAutoscaler for the gRPC gateway.
# Scales between 2 and 5 replicas based on average CPU utilisation.
# Requires the Kubernetes Metrics Server:
#   kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gateway-hpa
  namespace: cpg-cfo-agent
  labels:
    app: gateway
    app.kubernetes.io/part-of: cpg-cfo-agent
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min before scaling down
    scaleUp:
      stabilizationWindowSeconds: 30
