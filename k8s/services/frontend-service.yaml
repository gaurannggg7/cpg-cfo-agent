# frontend-service.yaml — LoadBalancer service for the Next.js frontend.
# Port 80 (external) maps to container port 3000.
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: cpg-cfo-agent
  labels:
    app: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: cpg-cfo-agent
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
