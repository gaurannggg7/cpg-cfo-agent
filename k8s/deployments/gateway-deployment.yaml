# gateway-deployment.yaml — Go gRPC gateway; 2 replicas, HPA-managed (see hpa.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: cpg-cfo-agent
  labels:
    app: gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: cpg-cfo-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          # Replace with your actual registry path after `docker build && docker push`.
          image: ghcr.io/gaurannggg7/cpg-cfo-agent/gateway:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: KAFKA_BOOTSTRAP_SERVERS
            - name: GRPC_GATEWAY_PORT
              value: "50051"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: 50051
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
