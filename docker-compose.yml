version: '3.8'

# Full local stack: Zookeeper, Kafka, Go gRPC gateway, FastAPI backend, Next.js frontend.
#
# Quick start:
#   docker-compose up --build
#
# HTTP path (existing):   http://localhost:3000  → POST /analyze
# gRPC path (new):        localhost:50051
# Kafka consumer (new):   cd backend && python kafka_consumer.py
# Prometheus metrics:     http://localhost:9090/metrics  (when consumer is running)

services:

  # ── Message bus ─────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    hostname: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "kafka-topics --bootstrap-server kafka:9092
        --create --if-not-exists
        --topic transaction-ingestion --replication-factor 1 --partitions 1 &&
       kafka-topics --bootstrap-server kafka:9092
        --create --if-not-exists
        --topic analysis-complete --replication-factor 1 --partitions 1 &&
       echo 'Kafka topics ready'"
    restart: "no"

  # ── gRPC gateway ─────────────────────────────────────────────────────────────

  gateway:
    build: ./services/gateway
    ports:
      - "50051:50051"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      GRPC_GATEWAY_PORT: "50051"

  # ── Application tier (unchanged from original) ───────────────────────────────

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend
